<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:34px 32px;color:var(--wf-ink-900);}
  .row{display:flex;gap:28px;}
  .b{width:120px;height:84px;background:var(--wf-paper);border-radius:var(--wf-radius-md);display:flex;align-items:flex-end;padding:8px;}
  .lab{font-family:var(--wf-font-mono);font-size:10px;color:var(--wf-ink-500);}
</style></head>
<body>
  <div class="row">
    <div class="b" style="box-shadow:var(--wf-shadow-xs)"><span class="lab">xs</span></div>
    <div class="b" style="box-shadow:var(--wf-shadow-sm)"><span class="lab">sm</span></div>
    <div class="b" style="box-shadow:var(--wf-shadow-md)"><span class="lab">md</span></div>
    <div class="b" style="box-shadow:var(--wf-shadow-lg)"><span class="lab">lg</span></div>
  </div>
</body></html>
