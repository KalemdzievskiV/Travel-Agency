<!-- @dsCard group="Colors" viewport="700x190" name="Ink · Warm neutrals" subtitle="Near-black through hairline greys. Text, borders, dark sections." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:24px;}
  .row{display:flex;gap:8px;}
  .sw{flex:1;border-radius:var(--wf-radius-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:8px;border:1px solid rgba(0,0,0,.06);}
  .sw .hex{font-family:var(--wf-font-mono);font-size:10px;}
  .sw .nm{font-size:10px;font-weight:600;margin-bottom:2px;}
  .on-dark{color:#fff;}.on-light{color:var(--wf-ink-900);}
</style></head>
<body>
  <div class="row">
    <div class="sw on-dark" style="background:var(--wf-ink-900)"><span class="nm">900</span><span class="hex">#16130F</span></div>
    <div class="sw on-dark" style="background:var(--wf-ink-700)"><span class="nm">700</span><span class="hex">#3A332B</span></div>
    <div class="sw on-dark" style="background:var(--wf-ink-500)"><span class="nm">500</span><span class="hex">#6B6258</span></div>
    <div class="sw on-light" style="background:var(--wf-ink-400)"><span class="nm">400</span><span class="hex">#948A7D</span></div>
    <div class="sw on-light" style="background:var(--wf-ink-300)"><span class="nm">300</span><span class="hex">#C4BCAF</span></div>
    <div class="sw on-light" style="background:var(--wf-ink-200)"><span class="nm">200</span><span class="hex">#DED7CB</span></div>
    <div class="sw on-light" style="background:var(--wf-ink-100)"><span class="nm">100</span><span class="hex">#ECE6DC</span></div>
  </div>
</body></html>
