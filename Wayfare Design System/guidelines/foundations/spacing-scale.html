<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:26px 32px;color:var(--wf-ink-900);}
  .r{display:flex;align-items:center;gap:14px;margin-bottom:9px;}
  .bar{background:var(--wf-coral-500);height:14px;border-radius:2px;}
  .lab{font-family:var(--wf-font-mono);font-size:11px;color:var(--wf-ink-500);width:120px;}
</style></head>
<body>
  <div class="r"><span class="lab">space-2 · 8</span><span class="bar" style="width:8px"></span></div>
  <div class="r"><span class="lab">space-3 · 12</span><span class="bar" style="width:12px"></span></div>
  <div class="r"><span class="lab">space-4 · 16</span><span class="bar" style="width:16px"></span></div>
  <div class="r"><span class="lab">space-5 · 24</span><span class="bar" style="width:24px"></span></div>
  <div class="r"><span class="lab">space-6 · 32</span><span class="bar" style="width:32px"></span></div>
  <div class="r"><span class="lab">space-7 · 48</span><span class="bar" style="width:48px"></span></div>
  <div class="r"><span class="lab">space-8 · 64</span><span class="bar" style="width:64px"></span></div>
  <div class="r"><span class="lab">space-9 · 96</span><span class="bar" style="width:96px"></span></div>
</body></html>
