<!-- @dsCard group="Spacing" viewport="700x180" name="Corner radius" subtitle="Restrained. Luxury reads square-ish; pills only for chips/tags." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:26px 32px;color:var(--wf-ink-900);}
  .row{display:flex;gap:20px;align-items:flex-end;}
  .b{width:88px;height:72px;background:var(--wf-paper);border:1px solid var(--wf-ink-300);}
  .lab{font-family:var(--wf-font-mono);font-size:10px;color:var(--wf-ink-500);margin-top:8px;display:block;text-align:center;}
</style></head>
<body>
  <div class="row">
    <div><div class="b" style="border-radius:var(--wf-radius-sm)"></div><span class="lab">sm · 2</span></div>
    <div><div class="b" style="border-radius:var(--wf-radius-md)"></div><span class="lab">md · 4</span></div>
    <div><div class="b" style="border-radius:var(--wf-radius-lg)"></div><span class="lab">lg · 8</span></div>
    <div><div class="b" style="border-radius:var(--wf-radius-xl)"></div><span class="lab">xl · 16</span></div>
    <div><div class="b" style="border-radius:var(--wf-radius-pill);width:120px"></div><span class="lab">pill</span></div>
  </div>
</body></html>
