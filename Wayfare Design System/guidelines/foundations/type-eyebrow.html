<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:32px;color:var(--wf-ink-900);display:flex;flex-direction:column;gap:18px;}
  .eyebrow{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--wf-coral-500);}
  .eyebrow.ink{color:var(--wf-ink-500);}
  .spec{font-family:var(--wf-font-mono);font-size:10px;color:var(--wf-ink-400);letter-spacing:0;margin-left:12px;}
</style></head>
<body>
  <div class="eyebrow">The Pursuit of Feeling <span class="spec">12px · 600 · .18em · coral</span></div>
  <div class="eyebrow ink">Remarkable experiences <span class="spec">12px · 600 · .18em · ink-500</span></div>
</body></html>
