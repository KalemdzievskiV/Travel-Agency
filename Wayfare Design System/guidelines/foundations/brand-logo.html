<!-- @dsCard group="Brand" viewport="700x320" name="Logo · lockups" subtitle="Compass mark + serif wordmark. Primary on cream, reversed on ink." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--wf-font-sans);display:grid;grid-template-rows:1fr 1fr;height:100vh;}
  .pane{display:flex;align-items:center;gap:48px;padding:0 40px;}
  .light{background:var(--wf-cream);}
  .dark{background:var(--wf-ink-900);}
  .lock{display:flex;align-items:center;gap:14px;}
  .lock img{width:38px;height:38px;display:block;}
  .word{font-family:var(--wf-font-display);font-weight:500;font-size:30px;letter-spacing:.01em;}
  .light .word{color:var(--wf-ink-900);}
  .dark .word{color:var(--wf-text-on-dark);}
  .caps{font-family:var(--wf-font-sans);font-weight:600;font-size:17px;letter-spacing:.34em;text-transform:uppercase;}
  .light .caps{color:var(--wf-ink-900);}
  .dark .caps{color:var(--wf-text-on-dark);}
</style></head>
<body>
  <div class="pane light">
    <div class="lock"><img src="../../assets/wayfare-mark.svg" alt=""><span class="word">Wayfare</span></div>
    <span class="caps">Wayfare</span>
  </div>
  <div class="pane dark">
    <div class="lock"><img src="../../assets/wayfare-mark-reversed.svg" alt=""><span class="word">Wayfare</span></div>
    <span class="caps">Wayfare</span>
  </div>
</body></html>
