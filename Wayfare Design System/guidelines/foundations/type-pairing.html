<!-- @dsCard group="Type" viewport="700x300" name="Pairing in use" subtitle="Eyebrow → serif display → grotesk body. The core editorial stack." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:32px;color:var(--wf-ink-900);}
  .eyebrow{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.18em;color:var(--wf-coral-500);margin-bottom:16px;}
  h2{font-family:var(--wf-font-display);font-weight:500;font-size:42px;line-height:1.06;letter-spacing:-.02em;margin:0 0 16px;max-width:560px;}
  p{font-size:16px;line-height:1.65;color:var(--wf-ink-700);max-width:520px;margin:0;}
</style></head>
<body>
  <div class="eyebrow">Slow Travel</div>
  <h2>As the world gets busier, the case for going slowly has never been clearer.</h2>
  <p>Meet fishermen in Maine, learn the old ways in Mongolia, or simply linger longer where it matters. Take the time to truly connect.</p>
</body></html>
