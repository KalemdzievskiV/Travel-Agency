<!-- @dsCard group="Colors" viewport="700x190" name="Brand · Coral" subtitle="The single accent — the 'tomato'. Use sparingly." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:24px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;border-radius:var(--wf-radius-md);height:96px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid rgba(0,0,0,.06);}
  .sw .hex{font-family:var(--wf-font-mono);font-size:11px;}
  .sw .nm{font-size:11px;font-weight:600;margin-bottom:2px;}
  .on-dark{color:#fff;}.on-light{color:var(--wf-ink-900);}
</style></head>
<body>
  <div class="row">
    <div class="sw on-light" style="background:var(--wf-coral-050)"><span class="nm">050</span><span class="hex">#FBEEE9</span></div>
    <div class="sw on-light" style="background:var(--wf-coral-200)"><span class="nm">200</span><span class="hex">#F4C2B4</span></div>
    <div class="sw on-dark" style="background:var(--wf-coral-400)"><span class="nm">400</span><span class="hex">#EC6B4F</span></div>
    <div class="sw on-dark" style="background:var(--wf-coral-500)"><span class="nm">500 · accent</span><span class="hex">#E14E31</span></div>
    <div class="sw on-dark" style="background:var(--wf-coral-600)"><span class="nm">600 · hover</span><span class="hex">#CF4329</span></div>
    <div class="sw on-dark" style="background:var(--wf-coral-700)"><span class="nm">700 · press</span><span class="hex">#B83A24</span></div>
  </div>
</body></html>
