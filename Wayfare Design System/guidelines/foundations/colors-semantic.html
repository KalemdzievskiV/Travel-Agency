<!-- @dsCard group="Colors" viewport="700x170" name="Semantic" subtitle="Quiet, earthy status colours — never neon." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-cream);font-family:var(--wf-font-sans);padding:24px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;border-radius:var(--wf-radius-md);height:84px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;color:#fff;}
  .sw .hex{font-family:var(--wf-font-mono);font-size:11px;}
  .sw .nm{font-size:11px;font-weight:600;margin-bottom:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--wf-success)"><span class="nm">Success</span><span class="hex">#4F7A52</span></div>
    <div class="sw" style="background:var(--wf-warning)"><span class="nm">Warning</span><span class="hex">#C98A2B</span></div>
    <div class="sw" style="background:var(--wf-error)"><span class="nm">Error</span><span class="hex">#C0392B</span></div>
    <div class="sw" style="background:var(--wf-info)"><span class="nm">Info</span><span class="hex">#3E5C76</span></div>
  </div>
</body></html>
