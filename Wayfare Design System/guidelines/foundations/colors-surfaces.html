<!-- @dsCard group="Colors" viewport="700x190" name="Surfaces" subtitle="Warm whites the product is built on. Imagery supplies the colour." -->
<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;background:var(--wf-ink-900);font-family:var(--wf-font-sans);padding:24px;}
  .row{display:flex;gap:10px;}
  .sw{flex:1;border-radius:var(--wf-radius-md);height:100px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;border:1px solid rgba(255,255,255,.12);color:var(--wf-ink-900);}
  .sw .hex{font-family:var(--wf-font-mono);font-size:11px;}
  .sw .nm{font-size:11px;font-weight:600;margin-bottom:2px;}
</style></head>
<body>
  <div class="row">
    <div class="sw" style="background:var(--wf-cream)"><span class="nm">Cream · page</span><span class="hex">#F6F2EA</span></div>
    <div class="sw" style="background:var(--wf-cream-2)"><span class="nm">Cream-2 · raised</span><span class="hex">#FBF8F2</span></div>
    <div class="sw" style="background:var(--wf-paper)"><span class="nm">Paper · card</span><span class="hex">#FFFFFF</span></div>
    <div class="sw" style="background:var(--wf-sand)"><span class="nm">Sand · alt block</span><span class="hex">#EEE7DA</span></div>
  </div>
</body></html>
