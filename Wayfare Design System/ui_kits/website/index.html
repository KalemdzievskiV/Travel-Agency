<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayfare — Luxury Travel</title>
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script type="text/babel" src="../../_dev_fallback.jsx"></script>
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{background:var(--wf-cream);font-family:var(--wf-font-sans);color:var(--wf-ink-900);-webkit-font-smoothing:antialiased;}
  #app{height:100vh;overflow-y:auto;}
  ::-webkit-scrollbar{width:10px;}::-webkit-scrollbar-thumb{background:var(--wf-ink-300);border-radius:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
<script type="text/babel">
function App(){
  const [route,setRoute]=React.useState("home");
  const [enquire,setEnquire]=React.useState(false);
  const scrollerRef=React.useRef(null);
  React.useEffect(()=>{ if(scrollerRef.current) scrollerRef.current.scrollTop=0; },[route]);
  const nav=(r)=>setRoute(r==="experiences"||r==="about"?"home":r);
  return (
    <div id="app" data-scroll ref={scrollerRef}>
      <Header current={route} onNav={nav} onEnquire={()=>setEnquire(true)} />
      {route==="home" && (<>
        <Hero onSearch={()=>setRoute("tripfinder")} />
        <FeelingIntro/>
        <PopularDestinations onOpen={setRoute} />
        <Experiences/>
        <Testimonials/>
        <PressWhy/>
      </>)}
      {route==="destinations" && <DestinationsScreen onOpen={setRoute} />}
      {route==="tripfinder" && <TripFinder/>}
      <Footer onEnquire={()=>setEnquire(true)} />
      <EnquiryModal open={enquire} onClose={()=>setEnquire(false)} />
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
